<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find & Replace Tool</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
    }
    h2 {
        margin-top: 0;
    }
    #status {
        font-weight: bold;
        margin-bottom: 10px;
        color: #222;
        font-size: 18px;
    }

    /* MASSIVELY improved readability */
    textarea {
        width: 100%;
        height: 480px;              /* Much taller */
        font-size: 20px;             /* Larger text */
        font-weight: 700;            /* Darker, heavier */
        color: #000;                 /* Deep black */
        line-height: 1.45;           /* Better readability */
        padding: 14px;
        box-sizing: border-box;
        resize: vertical;
        background: #ffffff;
        border: 2px solid #666;
        border-radius: 8px;
    }

    /* Bigger, darker Find/Replace fields */
    input[type="text"] {
        width: 48%;
        padding: 12px;
        font-size: 20px;
        font-weight: 700;
        color: #000;
        margin-bottom: 12px;
        border: 2px solid #666;
        border-radius: 8px;
    }

    button {
        padding: 14px 20px;
        margin-right: 8px;
        font-size: 18px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Find & Replace Tool</h2>

<div id="status"></div>

<textarea id="mainText" placeholder="Paste your text here..."></textarea>
<br><br>

<input type="text" id="findText" placeholder="Find">
<input type="text" id="replaceText" placeholder="Replace">
<br>

<button onclick="doFind()">Find</button>
<button onclick="doReplace()">Replace</button>
<button onclick="clearAll()">Clear</button>

<script>
let lastSearchIndex = 0;

// Auto-scroll to top on paste
document.getElementById("mainText").addEventListener("paste", function () {
    setTimeout(() => {
        this.scrollTop = 0;
        this.selectionStart = 0;
        this.selectionEnd = 0;
    }, 0);
});

// FIND
function doFind() {
    const textArea = document.getElementById("mainText");
    const findValue = document.getElementById("findText").value;
    const status = document.getElementById("status");

    if (!findValue) {
        status.textContent = "Enter text to find.";
        return;
    }

    const content = textArea.value;
    const index = content.indexOf(findValue, lastSearchIndex);

    if (index === -1) {
        status.textContent = "No more matches found.";
        lastSearchIndex = 0;
        return;
    }

    textArea.focus();
    textArea.selectionStart = index;
    textArea.selectionEnd = index + findValue.length;
    textArea.scrollTop = textArea.scrollHeight * (index / content.length);

    lastSearchIndex = index + findValue.length;
    status.textContent = "Match found.";
}

// REPLACE
function doReplace() {
    const textArea = document.getElementById("mainText");
    const findValue = document.getElementById("findText").value;
    const replaceValue = document.getElementById("replaceText").value;
    const status = document.getElementById("status");

    if (!findValue) {
        status.textContent = "Enter text to find.";
        return;
    }

    const content = textArea.value;
    const newContent = content.split(findValue).join(replaceValue);
    const count = (content.match(new RegExp(findValue, "g")) || []).length;

    textArea.value = newContent;
    status.textContent = count + " replacements made.";
    lastSearchIndex = 0;
}

// CLEAR BUTTON
function clearAll() {
    document.getElementById("mainText").value = "";
    document.getElementById("findText").value = "";
    document.getElementById("replaceText").value = "";
    document.getElementById("status").textContent = "";
    lastSearchIndex = 0;

    document.getElementById("findText").focus();
}
</script>

</body>
</html>
