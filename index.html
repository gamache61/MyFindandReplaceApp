<!DOCTYPE html>
<html lang="en">
<head>
  <title>Editable Code – Multi-line Find/Replace (Literal Match, Large Inputs)</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f6f6f7; }

    .header { padding: 14px; background: #364265; color: #fff; font-size: 22px; text-align: center; }

    /* NEW: message moved to top */
    .message {
      color: #29c079;
      font-weight: bold;
      padding: 10px 14px;
      font-size: 18px;
      background: #e0ffe9;
      border-bottom: 2px solid #b2f5c8;
    }

    .controls-stack { display: flex; flex-direction: column; gap: 9px; padding: 12px; background: #e7e7ed; }
    .controls-block { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
    .controls-block label { font-weight: bold; font-size: 16px; min-width: 60px; }
    .controls-block textarea {
      font-size: 16px;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #bbb;
      min-width: 120px;
      width: 100%;
      box-sizing: border-box;
      flex: 1;
      resize: vertical;
      overflow: auto;
    }
    .controls-block button { font-size: 16px; padding: 7px 14px; border-radius: 4px; background: #5679ff; color: #fff; border: none; cursor: pointer; }
    .controls-block .secondary { background: #bbb; color: #222; }

    .editor-container {
      position: relative;
      flex: 1;
      margin: 14px;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .highlight-layer, textarea#codeInput {
      min-height: 350px;
      padding: 18px;
      font-size: 17px;
      font-family: monospace;
      border-radius: 6px;
      border: 1px solid #bbb;
      background: #fff;
      color: #222;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
      overflow: auto;
    }

    .highlight-layer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1; pointer-events: none;
      white-space: pre-wrap; word-break: break-word;
    }

    textarea#codeInput {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%; background: transparent; z-index: 2;
    }

    .highlight { background: yellow; color: #111; }
    .replace-highlight { background: #00ffe7; color: #111; }
  </style>
</head>
<body>

  <div class="header">Editable Code – Multi-line Find/Replace</div>

  <!-- NEW: message moved to top -->
  <div id="message" class="message">Ready.</div>

  <div class="controls-stack">
    <div class="controls-block">
      <label for="findInput">Find</label>
      <textarea id="findInput" placeholder="Find text" rows="2"></textarea>
      <button onclick="highlightCode()">Find</button>
      <button class="secondary" onclick="useSelectionAsFind()">Use Selection</button>
      <button class="secondary" onclick="clearFindReplace()">Clear</button>
      <button class="secondary" onclick="clearCode()">Clear Code</button>
    </div>

    <div class="controls-block">
      <label for="replaceInput">Replace</label>
      <textarea id="replaceInput" placeholder="Replace with" rows="2"></textarea>
      <button onclick="replaceCode()">Replace</button>
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>

  <div class="editor-container">
    <div class="highlight-layer" id="highlightLayer"></div>
    <textarea id="codeInput" spellcheck="false" placeholder="Paste your code here..."></textarea>
  </div>

  <script>
    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;");
    }

    function normalize(text) {
      return text.replace(/\r\n/g, "\n");
    }

    function useSelectionAsFind() {
      const ta = document.getElementById('codeInput');
      const start = ta.selectionStart;
      const end = ta.selectionEnd;

      if (start === end) {
        setMessage("No selection to use.");
        return;
      }

      const selected = ta.value.substring(start, end);
      document.getElementById('findInput').value = selected;
      setMessage("Selection copied into Find.");
    }

    function setMessage(msg) {
      document.getElementById('message').textContent = msg;
    }

    function highlightCode() {
      const ta = document.getElementById('codeInput');
      const code = normalize(ta.value);
      let search = normalize(document.getElementById('findInput').value);

      if (!search) {
        document.getElementById('highlightLayer').innerHTML = escapeHtml(code);
        setMessage("No search text.");
        return;
      }

      let result = "";
      let idx = code.indexOf(search);
      let firstIdx = -1;
      let matchLen = search.length;
      let lastIndex = 0;
      let nMatches = 0;

      while (idx !== -1) {
        if (firstIdx === -1) firstIdx = idx;
        result += escapeHtml(code.slice(lastIndex, idx)) +
                  `<span class="highlight">${escapeHtml(code.substr(idx, matchLen))}</span>`;
        lastIndex = idx + matchLen;
        idx = code.indexOf(search, lastIndex);
        nMatches++;
      }

      result += escapeHtml(code.slice(lastIndex));
      document.getElementById('highlightLayer').innerHTML = result;

      if (firstIdx >= 0) {
        ta.focus();
        ta.selectionStart = firstIdx;
        ta.selectionEnd = firstIdx + matchLen;

        setTimeout(() => {
          const lines = code.substring(0, firstIdx).split("\n").length;
          const lineHeight = 22;
          ta.scrollTop = (lines - 1) * lineHeight;
          document.getElementById('highlightLayer').scrollTop = ta.scrollTop;
        }, 80);

        setMessage(`Found ${nMatches} match(es).`);
      } else {
        setMessage("No matches found.");
      }
    }

    function replaceCode() {
      const ta = document.getElementById('codeInput');
      let code = normalize(ta.value);
      let find = normalize(document.getElementById('findInput').value);
      const replaceWith = normalize(document.getElementById('replaceInput').value);

      if (!find) {
        updateOverlayNoHighlight();
        setMessage("No search text.");
        return;
      }

      let newCode = code.split(find).join(replaceWith);
      ta.value = newCode;

      let esc = escapeHtml(newCode);
      if (replaceWith !== "") {
        const escReplace = escapeHtml(replaceWith);
        esc = esc.split(escReplace).join(`<span class="replace-highlight">${escReplace}</span>`);
      }

      document.getElementById('highlightLayer').innerHTML = esc;
      setMessage(`Replaced all occurrences.`);
    }

    function updateOverlayNoHighlight() {
      const code = document.getElementById('codeInput').value;
      document.getElementById('highlightLayer').innerHTML = escapeHtml(code);
    }

    function copyCode() {
      const code = document.getElementById('codeInput').value;
      navigator.clipboard.writeText(code)
        .then(() => setMessage("Code copied."))
        .catch(() => setMessage("Copy failed."));
    }

    function clearFindReplace() {
      document.getElementById('findInput').value = '';
      document.getElementById('replaceInput').value = '';
      updateOverlayNoHighlight();
      setMessage("Cleared.");
    }

    function clearCode() {
      document.getElementById('codeInput').value = '';
      updateOverlayNoHighlight();
      setMessage("Code cleared.");
    }

    document.getElementById('codeInput').addEventListener('input', updateOverlayNoHighlight);
    document.getElementById('codeInput').addEventListener('scroll', function() {
      document.getElementById('highlightLayer').scrollTop = this.scrollTop;
      document.getElementById('highlightLayer').scrollLeft = this.scrollLeft;
    });

    updateOverlayNoHighlight();
  </script>
</body>
</html>
