<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Find & Replace – ContentEditable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #status {
      padding: 6px 10px;
      background: #153;
      color: #eaffea;
      font-size: 13px;
      border-bottom: 1px solid #2a5;
    }
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px;
      background: #181818;
      border-bottom: 1px solid #333;
      font-size: 13px;
    }
    #toolbar input[type="text"] {
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #000;
      color: #eee;
      min-width: 80px;
    }
    #toolbar button {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
    }
    #toolbar button:active {
      background: #444;
    }
    #editor-container {
      flex: 1;
      padding: 6px;
      overflow: auto;
      background: #000;
    }
    #editor {
      min-height: 100%;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.4;
      outline: none;
      color: #eee;
    }
    mark.find-highlight {
      background: #ff0;
      color: #000;
    }
    mark.replace-highlight {
      background: #0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <div id="status">Ready.</div>
  <div id="toolbar">
    <input type="text" id="find-input" placeholder="Find" />
    <input type="text" id="replace-input" placeholder="Replace" />
    <button id="use-selection-btn">Use Selection</button>
    <button id="find-btn">Find</button>
    <button id="replace-btn">Replace</button>
    <button id="replace-all-btn">Replace All</button>
  </div>
  <div id="editor-container">
    <div id="editor" contenteditable="true"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const editorEl = document.getElementById('editor');
    const findInput = document.getElementById('find-input');
    const replaceInput = document.getElementById('replace-input');
    const useSelectionBtn = document.getElementById('use-selection-btn');
    const findBtn = document.getElementById('find-btn');
    const replaceBtn = document.getElementById('replace-btn');
    const replaceAllBtn = document.getElementById('replace-all-btn');

    let lastFind = '';
    let lastIndex = -1;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.background = isError ? '#531515' : '#153';
      statusEl.style.color = isError ? '#ffeaea' : '#eaffea';
    }

    function getEditorText() {
      // Normalize line endings to \n so multi-line searches work
      return editorEl.innerText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    }

    function setEditorText(text) {
      // Preserve line breaks visually
      editorEl.textContent = text;
    }

    function clearHighlights() {
      const marks = editorEl.querySelectorAll('mark.find-highlight, mark.replace-highlight');
      for (const m of marks) {
        const parent = m.parentNode;
        while (m.firstChild) parent.insertBefore(m.firstChild, m);
        parent.removeChild(m);
      }
    }

    function highlightRange(start, length, className) {
      // Work on plain text, then rebuild HTML with a mark around the range
      const text = getEditorText();
      const before = text.slice(0, start);
      const target = text.slice(start, start + length);
      const after = text.slice(start + length);

      function escapeHtml(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      const html =
        escapeHtml(before) +
        '<mark class="' + className + '">' +
        escapeHtml(target) +
        '</mark>' +
        escapeHtml(after);

      editorEl.innerHTML = html;
      // Scroll the highlighted part into view
      const mark = editorEl.querySelector('mark.' + className);
      if (mark) {
        const rect = mark.getBoundingClientRect();
        const containerRect = editorEl.parentNode.getBoundingClientRect();
        if (rect.top < containerRect.top || rect.bottom > containerRect.bottom) {
          mark.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }
    }

    function findNext() {
      clearHighlights();
      const text = getEditorText();
      const query = findInput.value;
      if (!query) {
        setStatus('Enter text to find.', true);
        return;
      }

      // If new query, reset index
      if (query !== lastFind) {
        lastFind = query;
        lastIndex = -1;
      }

      const idx = text.indexOf(query, lastIndex + 1);
      if (idx === -1) {
        if (lastIndex === -1) {
          setStatus('No matches found.', true);
        } else {
          setStatus('No more matches. Wrapped to start.');
          const wrapIdx = text.indexOf(query, 0);
          if (wrapIdx === -1) {
            setStatus('No matches found.', true);
            lastIndex = -1;
            return;
          }
          lastIndex = wrapIdx;
          highlightRange(wrapIdx, query.length, 'find-highlight');
          const count = (text.match(new RegExp(escapeRegExp(query), 'g')) || []).length;
          setStatus('Found ' + count + ' matches. Showing first.');
        }
        return;
      }

      lastIndex = idx;
      highlightRange(idx, query.length, 'find-highlight');

      const count = (text.match(new RegExp(escapeRegExp(query), 'g')) || []).length;
      setStatus('Found ' + count + ' matches. Showing one.');
    }

    function replaceOnce() {
      clearHighlights();
      const text = getEditorText();
      const query = findInput.value;
      const replacement = replaceInput.value;

      if (!query) {
        setStatus('Enter text to find.', true);
        return;
      }

      // If lastIndex is invalid, find first
      if (lastIndex < 0 || text.indexOf(query, lastIndex) !== lastIndex) {
        lastIndex = text.indexOf(query);
        if (lastIndex === -1) {
          setStatus('No matches to replace.', true);
          return;
        }
      }

      const before = text.slice(0, lastIndex);
      const after = text.slice(lastIndex + query.length);
      const newText = before + replacement + after;
      setEditorText(newText);

      const newIndex = before.length + replacement.length;
      lastIndex = newText.indexOf(query, newIndex);

      if (lastIndex !== -1) {
        highlightRange(lastIndex, query.length, 'find-highlight');
        const count = (newText.match(new RegExp(escapeRegExp(query), 'g')) || []).length;
        setStatus('Replaced one. ' + count + ' remaining.');
      } else {
        setStatus('Replaced one. No more matches.');
      }
    }

    function replaceAll() {
      clearHighlights();
      const text = getEditorText();
      const query = findInput.value;
      const replacement = replaceInput.value;

      if (!query) {
        setStatus('Enter text to find.', true);
        return;
      }

      const re = new RegExp(escapeRegExp(query), 'g');
      const matches = text.match(re);
      if (!matches) {
        setStatus('No matches to replace.', true);
        return;
      }

      const newText = text.replace(re, replacement);
      setEditorText(newText);
      setStatus('Replaced ' + matches.length + ' occurrences.');
      lastIndex = -1;
      lastFind = query;
    }

    function escapeRegExp(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function useSelection() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) {
        setStatus('No selection found.', true);
        return;
      }
      const range = sel.getRangeAt(0);
      if (!editorEl.contains(range.commonAncestorContainer)) {
        setStatus('Selection is outside the editor.', true);
        return;
      }
      const selectedText = sel.toString();
      if (!selectedText) {
        setStatus('Selection is empty.', true);
        return;
      }
      findInput.value = selectedText;
      lastFind = selectedText;
      lastIndex = -1;
      setStatus('Using selection as search text.');
    }

    useSelectionBtn.addEventListener('click', useSelection);
    findBtn.addEventListener('click', findNext);
    replaceBtn.addEventListener('click', replaceOnce);
    replaceAllBtn.addEventListener('click', replaceAll);

    // Keyboard shortcuts (optional, if a hardware keyboard is attached)
    document.addEventListener('keydown', (e) => {
      if (e.metaKey || e.ctrlKey) {
        if (e.key === 'g') {
          e.preventDefault();
          findNext();
        }
      }
    });

    setStatus('Ready.');
  </script>
</body>
</html>
