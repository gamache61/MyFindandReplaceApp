<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Find & Replace Tool</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #e6e6e6;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    #status {
        padding: 14px;
        background: #ffffff;
        border-bottom: 2px solid #ccc;
        font-size: 24px;
        font-weight: bold;
        text-align: center;
    }

    textarea {
        width: 100%;
        height: 55vh;
        font-size: 22px;
        padding: 14px;
        box-sizing: border-box;
        border: none;
        outline: none;
        resize: none;
    }

    .controls {
        padding: 12px;
        background: #f8f8f8;
        border-top: 2px solid #ccc;
    }

    input {
        font-size: 22px;
        padding: 10px;
        width: 45%;
        margin-bottom: 12px;
    }

    button {
        font-size: 22px;
        padding: 14px 20px;
        margin-right: 10px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<!-- STATUS LINE -->
<div id="status">Ready.</div>

<!-- MAIN TEXT AREA -->
<textarea id="mainText" placeholder="Paste your text here..."></textarea>

<!-- CONTROL PANEL -->
<div class="controls">
    <input id="findText" placeholder="Find">
    <input id="replaceText" placeholder="Replace">

    <br>

    <button onclick="doFind()">Find</button>
    <button onclick="doReplace()">Replace</button>
    <button onclick="doReplaceAll()">Replace All</button>
    <button onclick="doClear()">Clear</button>
</div>

<script>
let currentMatchIndex = -1;

// Update status line
function setStatus(message) {
    document.getElementById("status").textContent = message;
}

// FIND
function doFind() {
    const textarea = document.getElementById("mainText");
    const text = textarea.value;
    const find = document.getElementById("findText").value;

    if (!find) {
        setStatus("No search term entered.");
        return;
    }

    const matches = [...text.matchAll(new RegExp(find, "g"))];

    if (matches.length === 0) {
        setStatus("No matches found.");
        return;
    }

    currentMatchIndex = (currentMatchIndex + 1) % matches.length;

    const match = matches[currentMatchIndex];

    textarea.focus();
    textarea.setSelectionRange(match.index, match.index + find.length);

    setStatus(`Found ${matches.length} matches. Showing match ${currentMatchIndex + 1} of ${matches.length}.`);
}

// REPLACE (single)
function doReplace() {
    const textarea = document.getElementById("mainText");
    const find = document.getElementById("findText").value;
    const replace = document.getElementById("replaceText").value;

    if (!find) {
        setStatus("No search term entered.");
        return;
    }

    const selected = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);

    if (selected !== find) {
        setStatus("No match selected to replace.");
        return;
    }

    textarea.setRangeText(replace);
    setStatus("Replaced 1 occurrence.");
}

// REPLACE ALL
function doReplaceAll() {
    const textarea = document.getElementById("mainText");
    const find = document.getElementById("findText").value;
    const replace = document.getElementById("replaceText").value;

    if (!find) {
        setStatus("No search term entered.");
        return;
    }

    const text = textarea.value;
    const matches = [...text.matchAll(new RegExp(find, "g"))];

    if (matches.length === 0) {
        setStatus("No matches found.");
        return;
    }

    textarea.value = text.split(find).join(replace);
    setStatus(`Replaced ${matches.length} occurrences.`);
}

// CLEAR
function doClear() {
    document.getElementById("mainText").value = "";
    document.getElementById("findText").value = "";
    document.getElementById("replaceText").value = "";
    currentMatchIndex = -1;
    setStatus("Ready.");
}
</script>

</body>
</html>
